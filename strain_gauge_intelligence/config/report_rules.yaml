banned_summary_phrases:
  - 公开材料显示
  - 资料未提供足够细节
  - 暂不能确认更多参数
  - 仅记录已披露动作

technical_routes:
  - route: 金属箔式应变片 + 弹性体
    judgement: 成本和可靠性最成熟，适合机器人腕部六轴力/力矩传感器量产；短板是装贴一致性、温漂补偿和弹性体加工精度。
  - route: 薄膜应变片
    judgement: 有利于小型化和批量一致性，可减少人工贴片误差；难点在薄膜沉积、图形化、封装保护和长期漂移。
  - route: 柔性应变传感器
    judgement: 适合灵巧手、触觉皮肤和曲面布置，可与 FPC 结构耦合；但滞后、蠕变、重复性和标定稳定性仍需验证。
  - route: MEMS / 硅基力传感
    judgement: 小尺寸和高一致性优势明显，适合指尖或微型末端执行器；承载能力、过载保护和封装成本是机器人应用关键边界。
  - route: 光纤或其他新型传感路线
    judgement: 抗电磁干扰和长距离布设有优势，但在成本、读出系统、机器人紧凑集成和量产供应链方面仍弱于应变电桥路线。

